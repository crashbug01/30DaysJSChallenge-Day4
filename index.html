<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>30 Days JS Challenge - Day 4</title>
  </head>
  <body>
    <script>
      const inventors = [
        { first: "Albert", last: "Einstein", year: 1879, passed: 1955 },
        { first: "Isaa", last: "Newton", year: 1643, passed: 1727 },
        { first: "Galileo", last: "Galilei", year: 1564, passed: 1642 },
        { first: "Marie", last: "Currie", year: 1867, passed: 1934 },
        { first: "Johannes", last: "Kepler", year: 1571, passed: 1630 },
        { first: "Nicolaus", last: "Copernicus", year: 1473, passed: 1543 },
        { first: "Max", last: "Planck", year: 1858, passed: 1947 },
      ];

      const people = [
        "Beck, Glen",
        "Becker, Carl",
        "Beckett, Samuel",
        "Beddoes, Mick",
        "Beecher, Henry",
        "Beethoven, Ludwig",
        "Begin, Menachem",
        "Belloc, Hilaire",
        "Bellow, Saul",
        "Benchley, Robert",
        "Benenson, Peter",
        "Ben-Gurion, David",
        "Benjamin, Walter",
        "Benn, Tony",
        "Bennington, Chester",
        "Benson, Leana",
        "Bent, Silas",
        "Bentsen, Lloyd",
        "Berger, Ric",
        "Bergman, Ingmar",
        "Berio, Luciano",
        "Berle, Milton",
        "Berlin, Irving",
        "Berne, Eric",
        "Bernhard, Sandra",
        "Berra, Yogi",
        "Berry, Halle",
        "Berry, Wendell",
        "Bethea, Erin",
        "Bevan, Aneurin",
        "Bevel, Ken",
        "Biden, Joseph",
        "Bierce, Ambrose",
        "Biko, Steve",
        "Billing, Josh",
        "Biondo, Frank",
        "Birrell, Augustine",
        "Black, Elk",
        "Blair, Robert",
        "Blair, Tony",
        "Blake, William",
      ];

      // Array.prototype.filter()
      // 1. Filter the list of inventors for those who where born in the 1500's

      // const fifteen = inventors.filter(function (inventor) {
      //   if (inventor.year >= 1500 && inventor.year < 1600) {
      //     return true;
      //   }
      // });

      const fifteen = inventors.filter(
        (inventor) => inventor.year >= 1500 && inventor.year < 1600,
      );

      console.log("Inventors born in the 1500's");
      console.table(fifteen);

      // Array.prototype.map()
      // 2. Give us an array of the inventors first and last names

      // const fullNames = inventors.map(function (inventor) {
      //   return inventor.first + " " + inventor.last;
      // });

      const fullNames = inventors.map(
        (inventor) => inventor.first + " " + inventor.last,
      );

      console.log("Inventors full names");
      console.table(fullNames);

      // Array.prototype.sort()
      // 3. Sort the inventors by birthdate, oldest to youngest

      // const sort = inventors.sort(function (a, b) {
      //   if (a.year > b.year) {
      //     return 1;
      //   } else {
      //     return -1;
      //   }
      // });

      const sort = inventors.sort((a, b) => (a.year > b.year ? 1 : -1));

      console.log("Inventors sort by their birthdate");
      console.table(sort);

      // Array.prototype.reduce()
      // 4. How many years did all the inventors live?
      const years = inventors.reduce((total, inventor) => {
        return total + (inventor.passed - inventor.year);
      }, 0);

      console.log("Inventors combined age");
      console.log(years);

      // 5. Sort the inventors by years lived
      const age = inventors.sort((a, b) =>
        a.passed - a.year > b.passed - b.year ? 1 : -1,
      );

      console.log("Inventors sort by their age");
      console.table(age);

      // 6. Create a list of boulevards in Paris that contain 'de' anywhere in the name
      // https://en.wikipedia.org/wiki/Category:Boulevards_in_Paris

      // 7. Sort execise
      // Sort the people alphabetically by last name

      // const list = people.sort((a, b) => (a > b ? 1 : -1));

      const list = people.sort((front, back) => {
        const [abehind, aupfront] = front.split(", ");
        const [bbehind, bupfront] = back.split(", ");
        return abehind > bbehind ? 1 : -1;
      });

      console.table(list);

      // 8. Reduce exercise
      // Sum up the instance of each of these
      const data = [
        "car",
        "car",
        "truck",
        "truck",
        "bike",
        "walk",
        "car",
        "van",
        "bike",
        "walk",
        "car",
        "van",
        "car",
        "truck",
      ];

      const transportation = data.reduce(function (obj, item) {
        if (!obj[item]) {
          obj[item] = 0;
        }
        obj[item]++;
        return obj;
      }, {});

      console.table(transportation);
    </script>
  </body>
</html>
